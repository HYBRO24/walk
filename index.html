<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>date</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;}
body{font-family:-apple-system,BlinkMacSystemFont,Segoe UI,sans-serif;background:#f5f3ef;min-height:100vh;}
.page{max-width:480px;margin:0 auto;padding:0 0 40px;}
.hero{position:relative;height:420px;overflow:hidden;}
.hero-bg{width:100%;height:100%;object-fit:cover;object-position:center;display:block;}
.hero-overlay{position:absolute;inset:0;background:linear-gradient(to bottom,rgba(0,0,0,.02) 0%,rgba(0,0,0,.62) 100%);display:flex;flex-direction:column;justify-content:flex-end;padding:28px 24px;}
.hero-title{color:#fff;font-size:26px;font-weight:600;line-height:1.35;}
.hero-sub{color:rgba(255,255,255,.82);font-size:13px;margin-top:8px;}
.avatar-wrap{position:absolute;top:20px;right:20px;}
.avatar{width:68px;height:68px;border-radius:50%;border:2.5px solid rgba(255,255,255,.92);object-fit:cover;object-position:center top;box-shadow:0 2px 14px rgba(0,0,0,.3);display:block;}
.card{background:#fff;border-radius:20px;margin:12px 16px 0;padding:20px;}
.lbl{font-size:11px;font-weight:600;letter-spacing:.07em;text-transform:uppercase;color:#888;margin-bottom:14px;}
.slot{border:1.5px solid #e8e4df;border-radius:14px;padding:14px 16px;margin-bottom:10px;cursor:pointer;display:flex;align-items:center;justify-content:space-between;transition:all .18s;}
.slot:last-child{margin-bottom:0;}
.slot:hover{border-color:#c5bdb3;background:#faf8f5;}
.slot.sel{border-color:#1a6b4a;background:#eef7f2;}
.sd{font-size:15px;font-weight:600;color:#222;}
.st{font-size:13px;color:#999;margin-top:3px;}
.slot.sel .sd{color:#0f5c3d;}
.slot.sel .st{color:#1a6b4a;}
.ck{width:24px;height:24px;border-radius:50%;border:1.5px solid #ddd;display:flex;align-items:center;justify-content:center;flex-shrink:0;transition:all .18s;}
.slot.sel .ck{background:#1a6b4a;border-color:#1a6b4a;}
.ci{opacity:0;transition:opacity .18s;}
.slot.sel .ci{opacity:1;}
.nc{background:#fff;border-radius:20px;margin:12px 16px 0;padding:18px 20px;text-align:center;}
.nt{font-size:13px;color:#888;line-height:1.7;}
.bw{padding:0 16px;margin-top:14px;}
.cb{width:100%;padding:16px;background:#1a6b4a;color:#fff;border:none;border-radius:16px;font-size:15px;font-weight:600;cursor:pointer;transition:opacity .15s;}
.cb:disabled{opacity:.35;cursor:default;}
.cb:not(:disabled):hover{opacity:.88;}
.suc{display:none;flex-direction:column;align-items:center;text-align:center;padding:60px 24px 40px;gap:16px;}
.si{width:80px;height:80px;border-radius:50%;background:#eef7f2;display:flex;align-items:center;justify-content:center;font-size:38px;}
.stit{font-size:24px;font-weight:700;color:#1a1a1a;}
.sdet{font-size:15px;color:#555;line-height:1.9;background:#f5f3ef;border-radius:14px;padding:16px 24px;}
.snot{font-size:13px;color:#888;line-height:1.7;}
</style>
</head>
